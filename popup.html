<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TagWrap</title>
  <style>
    :root {
      --bg: #18181b;
      --panel: #27272a;
      --border: #3f3f46;
      --text: #e4e4e7;
      --muted: #a1a1aa;
      --accent: #10b981;
    }
    body {
      width: 320px;
      margin: 0;
      padding: 14px 16px 16px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
    }
    h1 {
      margin: 0 0 2px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -.2px;
    }
    .subtitle {
      margin: 0 0 12px;
      font-size: 11px;
      color: var(--muted);
    }
    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      margin: 10px 0 6px;
      font-weight: 600;
    }
    .tag-list {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .tag-item {
      display: flex;
      align-items: center;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12.5px;
    }
    .tag-item:last-child {
      border-bottom: none;
    }
    .tag-item .name {
      flex: 1;
      padding: 2px 4px;
      color: #f4f4f5;
    }
    .tag-item .badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      margin-right: 6px;
      background: #3f3f46;
      color: #a1a1aa;
      font-family: system-ui, sans-serif;
    }
    .controls {
      display: flex;
      gap: 2px;
    }
    .controls button {
      background: #3f3f46;
      color: #d4d4d8;
      border: none;
      width: 22px;
      height: 22px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .controls button:hover {
      background: #52525b;
    }
    .controls button.danger:hover {
      background: #450a0a;
      color: #fda4af;
    }
    .add-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .add-row input {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 8px;
      border-radius: 6px;
      font-family: ui-monospace, monospace;
      font-size: 12px;
      outline: none;
    }
    .add-row input:focus {
      border-color: #10b981;
    }
    .add-row button {
      background: var(--accent);
      color: #052e16;
      border: none;
      padding: 0 12px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
    }
    .add-row button:hover {
      filter: brightness(1.1);
    }
    .hint {
      font-size: 10.5px;
      line-height: 1.35;
      color: var(--muted);
      background: #27272a;
      border: 1px solid var(--border);
      padding: 8px 9px;
      border-radius: 6px;
      margin: 8px 0;
    }
    .actions {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }
    .actions button {
      flex: 1;
      background: #3f3f46;
      color: #d4d4d8;
      border: 1px solid var(--border);
      padding: 6px 0;
      border-radius: 6px;
      font-size: 11.5px;
      cursor: pointer;
    }
    .actions button:hover {
      background: #52525b;
    }
    .footer {
      margin-top: 10px;
      font-size: 10px;
      color: #52525b;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>TagWrap</h1>
  <div class="subtitle">Right-click menu tags</div>

  <div class="section-title">Your tags (order matters)</div>

  <div id="tag-list" class="tag-list"></div>

  <div class="add-row">
    <input id="new-tag" type="text" placeholder="new-tag" spellcheck="false">
    <button id="add-btn">Add</button>
  </div>

  <div class="hint">
    • <strong>First 3</strong> appear directly in the context menu<br>
    • <strong>Next 5</strong> appear under the "More XML tags" submenu
  </div>

  <div class="actions">
    <button id="reset-btn">Reset to defaults</button>
  </div>

  <div class="footer">Changes are saved automatically</div>

  <script src="popup.js"></script>
</body>
</html>
